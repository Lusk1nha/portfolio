<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#0d1117"/>

  <!-- Accent top strip -->
  <rect x="0" y="0" width="32" height="2.5" rx="1.2" fill="#58a6ff"/>

  <!-- ◈  outer diamond -->
  <polygon
    points="16,5 27,16 16,27 5,16"
    fill="none"
    stroke="#58a6ff"
    stroke-width="1.8"
    stroke-linejoin="round"
  />

  <!-- ◈  inner diamond (filled, semi-transparent) -->
  <polygon
    points="16,10 22,16 16,22 10,16"
    fill="#58a6ff"
    fill-opacity="0.18"
    stroke="#58a6ff"
    stroke-width="1.2"
    stroke-linejoin="round"
  />

  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.2" fill="#58a6ff"/>
</svg>
